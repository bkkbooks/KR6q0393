body:
  text: 徒弟比丘慧省編次偈頌送天界真藏主潛宮正脈出梅洲夜夜潮聲撼石頭以字不成八不是護龍河上鐵船浮送蓮禪人回武林好山只在屋簷頭何必千巖萬壑遊十里湖光煙柳外畫船不是採蓮舟送整禪人歸揚州觀音閣號鐵牛功德山頭觀自在巍巍坐斷鐵牛機大人境界無人到門外長江映落暉次韻送天界玉藏主颯颯西風撼樹庭飄飄桂子落黃金五千餘卷從頭說潦倒瞿曇無二心送道者參萬峰和尚你儂莫是盧行者還我新州柴擔來轉向洞庭那畔看萬峰門戶潑天開答觀維那時在天目寄來佳句玉玲瓏三復窮吟意萬重獅子巖前春日暖杖藜獨立倚晴空送圓藏主之靈隱午夜白猿啼皎月重重華藏顯全機吾儂說話無憑據去問靈山老古錐送天禧深知客繽紛花雨講經時主伴機忘合化儀千古長干春意在一甌白雪漾玻璃送澤源深禪人歸少林一派流來空劫前洗清魔佛見根源到家句子如何舉熊耳峰頭浪拍天送靈谷原維那金槌影裏轉身來頂𩕳堂堂正眼開二月皇州春似海鍾山雨過碧崔嵬送端藏主之靈隱五千餘卷鉢囉娘潦倒東山舌缺長後夜鷲峰重揭示猿啼松頂月蒼蒼示慧玉范百戶揮來三尺吹毛劍凜凜光芒射斗牛鐵額銅頭俱倒退太平寰宇任遨遊示龍興如禪人乾坤函蓋有來由佛祖如何敢出頭萬疊淮山青倒卓桂輪孤朗一天秋示醫士朱慧覺話頭一則耆婆藥大藏諸經和劑方抹過二途開口笑不勞針砭起膏肓示洞庭玉禪人現成句子沒淆訛白玉無瑕底用磨極目太湖三萬頃一回拈起一回新示善哲女子岌岌海山多秀麗風光別是一般春爪籬撈得湘江月千古無生話又新示慧慶道者菩提無樹鏡非臺蕩蕩乾坤絶點埃一夜櫓聲搖落月衣孟傳得嶺南來示善寶居士風絮煙絲春復秋莫將情解混常流海門空闊銀濤靜好看天垂月一鉤次韻答天目明長老方處方兮圓處圓水光山色兩相便老來慵下蒼龍窟萬仞峰頭泊釣船寄醫士何慧芳雪山大樹世醫王香氣才沾病自忘溪月松風無限意不妨來與話宗綱寄寶陀原長老一曲絃調師子筋伯牙聞著膽魂驚子期不用黃金鑄小白花開滿四明寄湧泉無證和尚棺材頭畔行糧瓶我父臨行付與兄淚滿雙溪腸寸斷至今流水有哀聲化燈油劫初一點光明種猛烈工夫拶出來瀉入碧琉璃裏去百千諸佛笑顏開送雲南榮侍者之萬壽萬八千里雲南路鐵鞋踏破腳生胝鉢囊高挂北山寺對月長吟小艷詩送禮藏主少室門風運未衰西峰又見祖花開攜笻別我驚秋暮黃葉庭前積滿堆送靈隱源藏主回天龍演出何妨還演入鷲峰口縫未嘗開家山只在錢塘上夜夜潮聲吼怒雷雪澗六出遍遮千嶂色翩翩釣艇竟忘歸夕陽影裏東風暖添得寒泉漲滿溪雲菴一片一片復一片重重疊疊覆青山有時飛入松關裏占我尖頭屋半間曉堂金雞拍翅闌干上六戶當陽盡豁開驚起階前石師子倒銜玉兔去投胎示慧昭侍者個事昭昭心目間盡情放下見何難南方五十三知識眼上眉毛八字安上伏龍和尚羊腸鳥道絶行蹤日出三竿睡正濃因憶祖翁田契券夢魂長繞伏龍峰示天目禪人翻身摸著虛空鼻信手推開佛祖關鴻鴈數聲秋色老西風黃葉滿千山船居十首拋散家私徹骨貧乾坤等是一閒身水深不必篙竿探柁轉何妨手眼親千尺絲綸潭底意一輪明月眼中塵掀翻櫓棹從頭看誰是船兮誰是人船不疏兮我不親兩相交處兩無心水光碧處天光碧帆影沉時月影沉隔岸藕花香冉冉傍溪楊柳緑陰陰個中一段真消息知有誰人會此音船無定止柁無根船柁於吾若弟昆舉棹自然身有影停舟依舊水無痕和雲宴坐閒神識對月高眠絶夢魂任爾打頭風浪惡不妨左右自逢源不問前程淺與深只憑一隻定南針翻篷掉搶皆由我轉柂推扳總在心千頃浪翻千尺雪一枝櫓動一江音滿懷風月難分付斜倚篷窗獨自吟任從世諦自紛紜獨處舟中絶見聞順水行來船性穩逆風撐出浪花分漏篷斜透波心月壞衲橫披浦上雲千尺絲綸忘未得只緣潭底有金鱗輕舟一葉樂無窮八面縱橫路路通不必湖中尋范蠡卻從灘畔訪誠翁櫓聲搖出輪回轍帆葉搶歸逆順風更有一般奇特處柂頭常浸水晶宮梗跡萍蹤任去留往來灘畔懶拋鉤帆修有漏還無漏船逐邪流入正流四海煙波篷腳下五湖風月眼晴頭當陽唱起胡家曲不染人間半點愁一葉孤舟下激湍逆行順轉似龍蟠開篷未覺乾坤闊打棹方知湖海寬兩岸柳拖金色線一江風戛玉綸竿捲帆且泊斜陽外謾洗砂鍋煮月團老來甘與世相違今古乾坤一釣磯畫槳一條全祖意鐵篙三寸截流機飯炊芡實香偏好羹煮蒪絲味更肥此樂祗應同道者莫教俗客等間知生涯隨分復何為只個船兒自住持衝雨衝風青箬笠禦寒禦暑緑簑衣煙汀破曉數聲笛月渚橫秋一釣絲萬頃滄波真活計天荒地老不知歸送北平了禪人時在天目煙霞老我事如何覲侍獅巖窣堵波燁燁祖華開石罅寥寥古月掛松蘿自吾東海來歸隱有子北平方見過好把兩莖眉剔起看他烈焰發冰河次韻答安藏主老來懶打禾山鼓一榻巖房聽雨風謾有閒情思古道且無餘力起先宗白雲鎖斷三關路碧澗分開兩乳峰獨倚蘿窗宣妙偈瀑花飛雪灑空濛送雲南歎西堂三千九百丈天目秀色遙連金馬峰錫杖六環鳴夜月衲衣兩袖舞春風堂堂顯露半邊鼻著著全超向上宗頷下眉毛三尺雪莫將容易蓋雙瞳送雲南證西堂合頭語是繫驢橛此話傳來非等閒風暖巴江開曉凍梅香庾嶺露春顏海神撲碎黃金彈石女分開碧玉環拈卻劫初茅草令重來峰頂闢玄關送大川順首座道人何事下臺山惹得虛空展笑顏口縫未詢末後句腳跟已踏上頭關大川浩浩春波闊少室寥寥夜月寒重振宗綱當聖世金毛師子大家看送慧振郭百戶之江西葬母劬勞欲報貴真誠一顆心珠耿耿明陰壑三冬抽石筍長江六月結寒冰抱琴玉女朝天闕步月祥麟出鳳城最是酬恩親切處楚天空闊曉風清示童福宗居士二千年事至於今鷲嶺拈花示此心火在石中仍用擊眉橫眼上不須尋珠還合浦風波靜鐘動玉樓星斗沉莫謂空王無實相骨頭節節是黃金送慧吉侍者徑山禮祖凌霄秀拔群峰外子欲登臨莫等閒胸次鏟除元字腳機先拶透上頭關劍痕床在腥風泯喝石巖高祖道還千載欽師靈骨在巍巍一塔白雲間送祖禪人之姑蘇西來祖意本無傳自是當人見處偏可煞馬師無定策纍他南嶽苦磨磚春回澤國開冰鎖風轉松林奏玉絃一吸太湖三萬頃卻來參我句中玄送徒弟慧照參雙林和尚金華重疊皆靈境獨有雲黃山最高七級浮圖層落落兩條溪水浪滔滔天燈燦爛朝精舍花雨繽紛點毳袍方丈老禪為人處揭天棒喝起風濤送四川琛長老海寶千般先求如意琛也奇珍絶乎倫比了無瑕玷來先天光華燁燁騰大千迥然超出萬象表當陽揭示玄中玄個事明明誰辨的翻笑卞和徒費力只因喪卻目前機三獻由來仍受屈昔年地藏驗法眼塊石發機何太簡函蓋乾坤兮玉振金聲超越古今兮裁長就短子若干斯見得親揚起真風未為晚送性海真長老性海無風金波自湧撼倒須彌大千儱侗澄澄寂寂涵青空森羅萬象難逃蹤鐵船浮動不浮動總在一莖毛孔中有時徹底無涓滴蓬塵輥起三千尺翳卻阿那律眼睛直至如今開不得贈雲巢隱士隨所寓隨所寓隨所寓任運騰騰無定處泛宅浮家老此身水雲影裏無生路往來游戲一浮漚宛如碧玉壺中住逆風駕上須彌巔背手拔得珊瑚樹咄哉玄真子不識吾真趣老倒鴟夷翁風月無今古興來一口吞長江金波洶湧充饑腸化作無邊香水海八萬四千毛孔皆清涼或寓東西或南北傍梅待月無遲速片帆不覺過滄洲欸乃一聲山水緑紉草為衣狎鷗忘機飯有雕胡羹有蓴絲唱紫芝於花汀月浦歌白雪於蓮塘柳堤梗跡萍蹤無所依高風千古寄漁磯隨所寓隨所寓煙波歷盡無寒暑老我乾坤雪一頭滿懷風月難分付示智戒主戒如瓔珞珠亦如淨滿月汝當力堅持慎勿暫時瞥一念若遲疑生死無休歇光陰能幾何子自宜甄別吾家種草不易做眨起眉毛須薦取百尺竿頭解轉身腳底何妨草鞋破便甚麼會石女唱巴歌不甚麼會跛驢拽鐵磨囉囉哩黃頭碧眼知不知玉兔踏折珊瑚枝送虎丘統藏主拈得鉢囉娘一句絶毫絶釐沒巴鼻古木寒嵒月色新統攝大千歸自己蘇州有也常州有劍池夜半蒼龍吼驪珠抉得本無心一任猛風翻石臼五臺山上隔塵氛雲蒸飯熟香氤氳驚倒生公點頭石當機說法教誰聞送大龍興澤監寺大用現前滿眼滿耳才墮見聞埋沒自己石窗漏燈盞喪盡宗猷楊岐三腳驢全彰玄旨似火燒冰道人行履澤禪澤禪莫忘此理送玉禪人歸天台格外之機石中韞玉渾渾侖侖不受磨琢當陽忽剖開光明照幽谷覿體絶瑕痕誰能強名邈得來不費纖毫力翻笑卞和三度泣邁古超今也大奇驚倒豐干與寒拾示印禪人文彩未施全彰寶印信手搭來頭正尾正印空印水及印泥鼓聲咬折撞鍾槌羅𥈑羅也竟罔措聞根喪盡泄真機印水印泥還印空腳頭到處忘西東金毛哮吼大千震身在蟭螟眼孔中印泥印空復印水高峰頂上波濤起撼倒上天三十三舜若多神汗如雨一二三兮三二一六合茫茫誰辨的筆描八臂那吒神倒把稱鎚捏出汁送四川明禪人禮補陀明明百草頭明明祖師意直饒道得親猶是半途底此理灼然原自別海底泥牛嚼生鐵三峽銀河天上來夜深浸爛峨眉月明禪明禪知不知江南江北徒纍纍白華巖上頻伽語不是西川啼子規大龍興由俊上人求語住山一由一有一亦莫守俊快衲僧不存窠臼頂門正眼明如日轉轆轆兮明歷歷等閒照破劫空前不是心兮不是佛保福有願不撒沙古也今也徒矜誇第一山頭札得腳何妨處處開曇華示壽典座佛祖向上事急著眼睛看機先見得真方堪救一半栗棘蓬金剛圈端的從來吞透難若是吾家真種草等閒一鏃破三關驗人自具驗人眼活路通身有何限淨瓶踢倒笑呵呵堪與後昆作師範次韻示澤知客脫略衲僧家動轉如飛豹不墮有無功自然離用照無星稱上沒淆訛半斤八兩何須較與麼也一盞清茶醉不醒不與麼也耆婆妙藥難求效驀直臺山路不差夜行不許投明到爛炒浮漚當飯噇切忌翻卻煎茶銚示現禪人現成公案不必提撕塵塵剎剎顯露真機腳尖踢出西來意泥團土塊生光輝寒山拾得擔枷過狀普化臨濟疥狗泥豬風流出當家還他師子兒忽地青天轟霹靂驚起洞庭湖水立光福山頭浪拍天舜若多神面皮溼送由藏主道由心悟理緣事有提起破沙盆打殺子湖狗抹過太虛空法身藏北斗扶桑人種陝西田鐵牛耕破崑崙巔夜行人自愛明月不知腳底芒鞋穿阿呵呵羅囉哩三春依舊鵓鳩啼送日侍者禮補陀機中有句句中有機不是圓通法門亦非向上提持磐陀金剛石大海碧琉璃紫竹旃檀林八面香風吹白衣仙人識不識見時須是超聲色拍天大浪撼潮音夜半團團紅日出送在禪人伶俐衲僧行藏自別在在處處頭頭合轍金鎖玄關信手開銀山鐵壁難遮截一機拋出絶商量碧眼黃頭俱結舌越山青兮吳水緑今古遊人觀不足觀得足六六依然三十六次韻送皓首侍者萬法本來空一心何悄悄石人打鐵彈簉破虛空腦血濺須彌盧腥風四邊繞吹綻優曇花香噴苾芻草今古絶遮藏昭然明了了腳尾與腳頭總是長安道一任山青黃誰管歲月老如意自家珍楚璧原非寶送泥水水泄不通那一著八臂那吒摸不著道人兩眼見得親正好虛空中著腳虛空著腳良可奇絶躋攀處猶坦夷腳底水泥無半點手中泥水何嘗離施為動轉何超邁老蒼龍脊從空駕頭角崢嶸宇宙間縱使毗嵐吹不壞轉身句子無滲漏逸量神機碎窠臼旁提正按常住磚片片光生絶塵垢個樣從來本現成未動手時功已辦丈六金身草一莖一莖草上黃金殿示慧本居士欲了生死因先淨心為本一念若遲疑便落魔軍阱直須提起話頭參於一切處休顢頇驀地黑漆桶底脫萬象森羅毛骨寒爪籬拈向風前舞有口不說無生語一吸西江徹底乾瑞世優曇開鐵樹吳江縣佛弟子沈邦柱法名大翔張雋法名大梁董二酉法名淨翰捐資刻唯菴禪師語録第二卷吳門九章朱袞對稿金陵潘耕書自聞道人蔣成榮刊崇禎二年己巳歲佛成道日姑蘇兜率園識
