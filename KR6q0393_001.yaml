body:
  text: 徒弟比丘慧省編次金華聖壽寺語録山門未跨龍門腳踏實地已跨龍門腳踏實地驟步云一聲霹靂風雲起佛殿法報化身總是這箇畢竟以何為驗泥多佛大便禮拜土地堂正直聰明聰明正直顯正摧邪憑誰之力喝一喝祖堂你者一隊全無巴鼻六耳同謀有甚良計據室拈拄杖云縱也在我奪也在我鐵額銅頭也須按過卓拄杖指法座云進一步高一步踏到上頭全身獨露掣手云須彌燈王過那邊去遂升座拈香云此香爇向爐中端為今上皇帝祝延聖壽萬歲萬歲萬萬歲次拈香云此一瓣香大衆還知來處麼今日不惜眉毛爇向爐中奉為開山佛慧圓鑑普濟禪師千巖大和尚不圖酬恩報德且要遞相熱瞞遂就座東白和尚白槌罷師云垂鉤四海慣釣鯨鰲衆中莫有不顧性命者麼出來道一句看時有僧問云遠離松水來據龍峰海衆臨筵請師祝聖師云萬年松在祝融峰進云祝聖已蒙師指示列祖宗風事若何師云冬到寒食一百五進云莫便是和尚為人處也無師云斧頭是鐵做進云恁麼則龍門無宿客也師云早已點額進云若不登樓望焉知滄海深師云你道老僧眉毛有幾莖進云一堂風泠淡千古意分明師云蹉過不少進云承古有言向上一路千聖不傅還端的也無師云何處得這消息來進云賣金須遇買金人師喝一喝進云金屑雖貴落眼成翳又作麼生師云好向繡湖湖上看月明夜夜散金波進云三十年後此話大行師云杜撰禪和如麻似粟進云大衆證明學人禮拜師乃云第一義諦已被東白和尚一槌擊碎了也未免向第二義門露箇消息山僧數年搓得一條龜毛索子今日拈來將三世諸佛西天四七東土二三天下老和尚鼻孔一串穿卻了也且道山河大地草木叢林森羅萬象有情無情甚處得來良久云莫將間學解埋沒祖師心復舉三聖道我逢人則不出出則便為人興化道我逢人則出出則不為人師云這二老漢同門出入夙世怨家一人向孤峰頂上臥月眠雲一人向十字街頭揚塵簸土點撿將來二俱漏逗各與三十拄杖且道龍峰與麼提持是賞伊是罰伊驀拈拄杖卓一下云天上有星皆拱北人間無水不朝東當晚小參二十年在吳淞江上冒雨衝風拋綸擲釣雖無躍浪錦鱗且得去留自在今日被業風吹向千峰頂上隈巖傍壑直得四顧寥寥清風滿座見前莫有同生同死底衲僧麼出來相見如無然上座自起自倒去也乃拈拄杖云山僧拄杖子無端變作智者樓約國師走入玻璃瓶裏澡浴驚得雙林傅大士擲下擊門槌乃說偈云空手把鋤頭步行騎水牛人從橋上過橋流水不流諸人還見麼若也見得不妨橫行海上獨步乾坤其或未然拄杖子依前還作拄杖子見山是山見水是水上是天下是地所以道是法住法位世間相常住乃卓一下復舉西天異見王問波羅提尊者何者是佛性者云我見佛性王曰性在何處者云性在作用王曰是何作用者云今見作用王自不見王曰於我有不者云王若作用無有不是王不作用體亦難見王曰若當作用何處出現者云若作用時當有其八在胎曰身在世曰人在眼曰見在耳曰聞在鼻嗅香在舌談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者喚作佛性不識喚作精魂王聞是言心即開悟後來大慧和尚拈云若道在八處即是精魂若道離八處卻喚甚麼作佛性師云諸方盡道異見王聞法開悟殊不知波羅提尊者被王一拶直得伎窮力盡進退無門妙喜老人盡平生力也救他不得龍峰今日路見不平敢為古人出手去也乃喝一喝云適來異見王波羅提尊者老妙喜盡向這裏掃蹤滅跡了也更說甚麼佛性精魂作用見聞盡是陽焰空花不勞把捉且歸家穩坐一句作麼生道太平天子朝元日五色雲車駕六龍上堂日可冷月可熱衆魔不能壞真說有來由無途轍六月炎炎撒冰雪文殊無處著渾身普賢特地呈醜拙是真說非真說若無閒事掛心頭便是人間好時節喝一喝卓拄杖下座開山和尚忌日拈香云巴陵三轉語未足酬恩揚岐作女人拜深為負德然上座總不恁麼何故字經三寫烏焉成馬歲旦上堂元正啓祚萬物咸亨驀拈拄杖云拄杖子昨夜抽條今朝吐蕊花開五葉香遍大千且道當得新年頭佛法也無卓拄杖喝一喝官員至上堂舉昔日朗州刺史李翱慕藥山和尚道風屢請不赴乃肅裝客禮直造座前山默然殊不顧視李乃云見面不如聞名拂袖便行山召李李回首山云何得貴耳賤目李遂禮拜起問云如何是道山以手指天復指淨瓶云會麼李云不會山云雲在青霄水在瓶李因有省乃呈偈云煉得身形似鶴形千株松下兩函經我來問道無餘說雲在青霄水在瓶師云我這裏則不然今日若問龍峰如何是道但云國正天心順官清民自安且道與藥山還有優劣也無靠拄杖下座結制上堂九十日包三大劫諸人直要徹根源會須撥轉當頭柁覺海乘風駕鐵船驀拈拄杖云柁根在這裏鐵船在甚麼處喝一喝謝藏主維那上堂天無門地無戶俊快衲僧一任來去藏裏摩尼照徹十方洞裏桃花千葩競吐假劫外之春風應今時之律呂海神夜半看鮫珠眼光掛在扶桑樹喝一喝開爐上堂暖氣相接正在斯時深深冷灰裏撥著星兒之火向死柴頭上發機燎起亙天烈焰燒卻舜若多神面皮敢問諸人作麼生回避擲拄杖下座臘八上堂明星一見出山來剛道娘生已眼開不是髑髏乾得徹爭知春色上桃腮上堂不是心不是佛不是物是個什麼道得天下橫行便下座結制上堂一二三四五六七金剛捏出稱鎚汁七六五四三二一扶桑枝上懸紅日鷺鷥牽動鐵崑崙挨得虛空半邊側碧眼黃頭膽喪魂驚走入大圓覺海藏蹤遁跡浸爛鼻孔要且黈氣不得個事且止只如諸人日用二六時中畢竟作麼生履踐良久云不因樵子徑爭到葛洪家上堂今朝是初一龍象如稻麻有事與無事歸堂去喫茶上堂達摩西來不立文字直指人心見性成佛大衆作麼生說個見性成佛底道理良久云幸自無瘡勿傷之也上堂真不立妄本空有無俱遣不空空二十空門原不著一性如來體共同驀拈拄杖云只者拄杖子你諸人若不喚作一性如來便喚作二十空門直饒總不恁麼也是垛根漢擲拄杖下座端午上堂黃米粽喫一鉢菖蒲茶喫半甌個是衲僧好時節大家相見飽齁齁縱橫自在自樂自由說甚仰山開畬溈山牯牛禾山打鼓雪峰輥毬總是小兒雜劇且非先德宗猷只如端午掩殃一句又作麼生目前無怪異不用帖鍾馗上堂德山棒臨濟喝拈放一邊諸人腳跟下道將一句來以拄杖劃一劃云毗婆尸佛早留心直至如今不得妙解制上堂舉翠巖夏末示衆云一夏已來與兄弟說話看翠巖眉毛在麼保福云作賊人心虛師云好事不出門長慶云生也師云惡事傳千里雲門云關師云錯者一隊漢只解護惜眉毛不知打失鼻孔龍峰今日直要與伊據款結案大衆還委悉麼暑氣盡隨雲雨去清風透入戶庭來喝一喝上堂舉琅琊覺和尚僧問清淨本然云何忽生山河大地琊云清淨本然云何忽生山河大地其僧於言下有悟師云騎賊馬趕賊琅琊固是作家者僧如珠走盤一撥便轉可謂主賓互換箭鋒相拄雖然如此撿點將來猶缺淘冶在今日或有人問龍峰清淨本然云何忽生山河大地劈脊便棒且道與琅琊是同是別有眼衲子試辨看松隱上塔頂寶索上堂鉤鎖連環連環鉤鎖覿體全彰眼眼相顧其橫也穿卻虛空鼻頭其豎也鎖住須彌鐵柱親從惡辣鉗上煆煉得來豈比尋常麻纏紙裹個是谷寶居士壯觀浮圖騰今亙古底作也雖然如是且道高懸倒掛一句如何舉似四簷平定香雲繞萬世光華佛日長上堂衆集師顧左右云分明記取便下座上堂將此深心奉塵剎是則名為報佛恩拈拄杖云這個是深心那個是佛恩喝一喝上堂江月照松風吹永夜清宵何所為永嘉大師滿口道了也大衆還知落處麼卓拄杖云劫石有消日黃金無壞時端午上堂諸方盡喫菖蒲茶唯我自酌青原酒儱儱鬨鬨發顛狂打落南辰連北斗擲拄杖下座開爐上堂十月風高作寒色今朝正值開爐日長途多少未歸人祖父田園俱喪失何如白鷺鷥翹足溪邊立毛長骨瘦歷風波那論有食與無食諸兄弟也要大家知此消息且道是甚麼消息歸堂喫茶上堂舉僧問投子同禪師云不斷煩惱而入涅槃時如何同云者發殺業底師僧師云真不掩僞後問國清機和尚機劈脊便打師云曲不藏直投子只解裁長不能補短國清只解補短不能裁長今日忽有人問龍峰不斷煩惱而入涅槃時如何只對他道有水皆含月無山不帶雲靠拄杖下座結制上堂蠟人為驗始於今日九十日終推功辨的黃面老瞿曇結住布袋頭百萬人天咸皆受屈松隱結制總不恁麼以手作搖櫓勢云山僧即今駕無底鐵船普請大衆同入大圓覺海遊戲去也喝一喝云看取定南針冬至小參群陰剝盡一線新添祖令當行十方坐斷拈拄杖云拄杖子得者體用臨機縱奪殺活自由有時先照後用有時先用後照有時照用同時有時照用不同時以此點鐵成金以此超凡越聖以此恢拓宗綱以此續佛慧命乃喝一喝云山僧盡情撒向諸人面前了也個中直饒有個皮下有血頂門有眼底出來掀倒禪床喝散大衆也只作得半個衲僧且佛祖向上一句作麼生道若無舉鼎拔山力千里烏騅不易騎卓拄杖喝一喝復舉德山云今夜不答話問話者三十棒時有僧出禮拜山便打僧云某甲話也未問因甚便打山云你是甚處人僧云新羅人山云未跨船舷好與三十棒師云你諸人且道者僧合喫棒不合喫棒若道合喫棒者僧過在甚麼處若道不合喫棒爭奈德山令不虛行要會麼良久云不是李將軍徒勞射石虎上堂舉僧問雲門如何是超佛越祖之談門云糊餅大慧和尚拈云雲門直是好一枚糊餅要且無超佛越祖底道理師云大慧和尚一手抬一手搦未免話作兩橛既是好一枚糊餅又道無超佛越祖底道理諸禪德且道大慧和尚還有為人處也無參法語示生禪人古者道不得動著動著三十棒又道切忌生心動念才生心動念便不是了也先德發一言半語如利劍長矛動著便傷鋒犯手擬議則斷卻命根直是無你回避處無你湊泊處若是個漢那肯承虛接響滯殼迷封要須直截根源腳踏實地盡力捱將去日久月深打成一片也無生的心也無滅的心生滅一如動靜無二到這裏不覺不知打失眼睛鼻孔在大洋海底及乎撈摝歸來眼睛依然是眼睛鼻孔依然是鼻孔到此始可上人門戶剖露真情求大宗匠決擇明白方名真參學者卻於四威儀中隨緣飲啄不失其宜或孤峰獨宿或隱逸林泉或垂手入廛作饒益事三二十年保養充足忽出一言半語聲名腥香文彩發露天龍推出模範後昆不為分外古之學道之士參到大休大歇大安樂地方為了當嗟今時輩行腳才趕得些野狐涎唾相似語言便去眩惑他人堪作甚麼有一般底將古人公案向情識上卜度文字上引證蘊在胸中便為了事結半間茅屋以為死關滯寂沉空味於安逸開大口說大話弄虛頭惑其後學誠可憐愍驀然撞著個本色宗師漆桶依然不快豈不念雪山大沙門棄王宮夜半逾城六年苦行臘月八夜睹明星豁然大悟只如二祖可大師少室山前立雪斷臂得安心竟方堪為人榜樣生禪人你既居關理合大忘人世力進此道空一切相何以又起佛見法見瞥興妄念遠遠賫香求我無義味語以為居關之談柄此之見解大不唧溜古云真淨界中才一念閻浮早已八千年豈虛語哉你且道我這一絡索是發揚關中事關外事若撿點得出不妨廓大千沙界為一關一關容納大千沙界那時始好扶豎濟北三玄鑿開人天眼目激揚佛祖向上宗乘去也殊不知我天目佛日老祖避世逃名於萬峰之巔設個死關垂三轉語以為關鍵要斷學者偷心亦乃偶爾一期方便豈意靈龜曳尾欲隱彌露生禪人思之勉之示真禪人真禪人你參乃師萬峰和尚父母未生已前那個是我本來面目一句子此是老盧在黃梅五祖會下夜半受衣法渡江至大庾嶺頭被明上座隨後趕逐無處躲避臨危設個脫身款子乃云不思善不思惡正當與麼時那個是明上座本來面目當時明上座只知蜜甜豈知中了毒喪卻一條窮性命縱使耆婆扁鵲亦乃救之不得此話流傳到今鈍置後學仍不知當人十二時中四威儀內本來面目未嘗少間自是根思遲鈍不能深領以致昏時散時靜時動時忘古人大安樂田地造之不得坐之不穩若欲決了此事便從腳跟下將平日所參得底和個四大五蘊盡情放下然後併起勇猛志豎起精進幢瞪開兩眼緊捏雙拳如兩將爭鋒胸中憤憤舉起本參話頭直向疑不到處起疑方是真疑真疑既發恰如急水灘頭坐在一葉舟中順轉逆行浮逼逼地如月華透水蕩之不散如毗嵐風卷海水直教徹底無涓滴到此之際自然塵消業謝靜極光通那時爬得搆也切莫移晴動目凝定身心善巧方便不知不覺一拶拶透豁開己眼方知本來面目不從他得若要作大法器建立門庭更須向那邊更那邊打數百個懸空筋斗卻來喫我痛棒何故不見道雪後始知松柏操事難方見丈夫心示明禪者端的究明生死底人自然孤迥迥地不掛寸絲二十年三十年捩轉面皮討個分曉便是千手大悲也互換你不得此乃過量的人也若是隨漏輳漢喚東向東喚西向西腳跟下浮逼逼地豈肯向他古人真實田地上行只管貪程那知爛泥中有刺轉得腳來未免通身泥水你且道孤迥迥地底是隨漏輳底是參示禪者佛是衆生界中了事人衆生是佛界中不了事人若欲決了此事只消向十二時中四威儀內折旋俯仰與人酬酢處看是甚麼道理忽爾妄想滅知見忘突出自家一段光明洞徹十虛無絲毫隔礙始知佛與衆生本性平等一身清淨多身清淨一世界清淨多世界清淨無一塵不是真如境界無一剎不是解脫道場所以永嘉云一月普現一切水一切水月一月攝諸佛法身入我性我性同其如來合斯言豈欺我哉頌古世尊成道六載雪山空冷坐面如黃蠟骨如柴縱然親睹明星現也是街頭破草鞋世尊未離兜率已降王宮未出母胎度人已畢出得驢胎入馬腹六六依然三十六淵明固是不知歸重陽耽著籬邊菊達磨大師初至金陵見梁武帝帝問云如何是聖諦第一義師云廓然無聖帝云對朕者誰師云不識帝不領悟師遂折蘆渡江至魏後帝舉問志公公曰陛下識此人否帝云不識志云此是觀音大士傳佛心印曰當遣使詔之志云莫道陛下召闔國人去他亦不回腳頭未跨帝皇畿早已全身陷鐵圍漁父只憐鉤上餌不知簑笠墮魚磯雲門因僧問如何是諸佛出身處門云東山水上行秋林落葉擁闌干砌下蛩聲枕上寒最是月明風定夜溥溥玉露滴金盤趙州因僧問狗子還有佛性也無州云無出匣吹毛光灩灩一番用了一番磨鋒頭削落三斤鐵始信將軍血戰多萬法歸一一歸何處萬法歸一一何歸正是冰枯雪老時葭管灰飛消息好隴梅開遍向南枝趙州因僧問萬法歸一一歸何處州云我在青州做一領布衫重七斤一度拈來一度愁風前月下幾時休絲來線去渾間事添得娘生兩鬢秋高亭隔江見德山山以手中扇招之亭乃橫趨而去隔江招手橫趨去端的渠儂眼有筋打麵還他州土麥唱歌須是帝鄉人五祖演和尚云譬如牛過窗櫺頭角四蹄都過了只是尾巴過不得牛過窗櫺尾過難將軍活陷在重關當時不得雞傳曉直至而今去不還趙州因訪一菴主問云有麼有麼主豎起拳州云水淺不是泊船處拽下簾子便行又訪一菴主云有麼有麼主亦豎起拳州云能縱能奪能殺能活便作禮賣扇婆子手遮日賣油婆子水搽頭大底還他肌骨好不施紅粉也風流倩女離魂數聲羌笛最關情去路迢迢恨不勝倣佛暮雲歸未合遠山無限碧層層不生不滅虛空一劈成兩片妙在逢緣不借中黑漆崑崙騎白象藕絲竅裏舞春風睦州示衆云大事未明如喪考妣大事已明如喪考妣山邊水邊待月明暫向人間借路行如今還向山邊去秪有湖水無路行有無俱遣明頭來明頭打暗頭來暗頭打南海瞎波斯眉毛生頷下一花五葉一花開自少林春五葉流芳遍剎塵無限香風吹不斷紫金山聳玉崑崙臨濟三玄第一玄霹靂震堂前裂開露柱腹産下個奇男第二玄陸地駕鐵船木人齊拍手解唱囉哩嗹第三玄泥牛吼上天驚得虛空碎大地血漫漫三要第一要機先離用照一條折火叉打破嵩山灶第二要石女呵呵笑拈起沒絃琴彈出無生調第三要山門金剛懆努目嗔伽藍佛也難解教黃龍三關我手何似佛手蝦珧那能出斗金剛腦後拔丁不知脫落兩肘我腳何似驢腳動步早錯一著豈知昔日襄王倒被巫山迷卻生緣畢竟人人有獨我從來道是無昨夜坑頭糞蛆子無端咬落黃門鬚吳江縣佛弟子張維法名智嚴沈學閔法名淨英董之垣法名明震捐資刻唯菴禪師語録第一卷吳門九章朱袞對稿金陵潘耕書自聞道人蔣成榮刊崇禎二年己巳歲佛成道日姑蘇兜率園識
