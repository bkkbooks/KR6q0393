body:
  text: 唯菴然和尚語錄序余所居鄰縣有五雲山山勢回環若青蓮華然中聖壽禪寺其癈已久大善知識曰千嵒長公居焉四方學者雲臻川赴遂化椔翳之場以為金碧之區當時參扣道要者座下恒數百人其入室弟子唯菴禪師蓋傑然者也禪師早歲入道力抵諸方未有所契及謁千嵒聞其提唱豁然有所悟入舉目之頃日月星辰風霆雨露飛潛動蟄皆演如來大乘妙法於是聲光聳起叢林間遂補千巖故處說法度人逾年退歸華亭之松隱其信向者益眾雖自被衲袍日餐糗飯不啻天廚之珍錦綺之華也或人之稱但見其杜德機爾忽學子童徽持其語一編來徵余序凡讀之數過顧與二三子曰唯菴真誠有道之士哉觀其語言峭拔如銅關鐵壁利劍長矛豈唯不可湊泊亦無罅隙之可乘吁可畏哉余素與千巖游既序其語鍥梓行世今觀唯菴斯錄又獲廁名編端豈般若之緣實有在於父子間乎然而大圓覺海無物不照亦無一法可得此心若萌即墮第二義禪師諱德然字唯菴生雲間張氏其行業備著於松隱菴記茲不復贅洪武丙辰翰林學士金華宋濂序
