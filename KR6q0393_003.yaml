body:
  text: 徒弟比丘慧省編次幻隱歌為靈隱明長老賦世間萬事付一幻道人依幻而自住百千三昧在其中只把莖眉以為準幻隱那分優與劣隱幻何曾有生滅是幻全超曠劫前是隱不落今途轍有時依幻顯幻宛同大海一漚發大千小千俱包括有時從隱入隱轉向蟭螟眼孔中一身多身潛無蹤離幻身心自平等離隱全彰大圓鏡離無離處離復離繁興永處那伽定我歌幻隱荒蕪詞珍重靈山老古錐三百餘會說不盡於幻從頭闡化機古音歌為東陽諧長老賦羲皇之先有一曲音韻豈落平平仄彈來不在十指端屋角松風相倣佛非絲竹兮非笙簧非角羽兮非宮商高山流水和不得鏗金戛玉聲琅琅極升沉之源徹離微之根衆樂百千徒勞競奏師子一絃聊比倫有眼者覷之不見無耳者則乃親聞知音更有知音知知音何獨鍾子期破屋歌為華禪人賦道人性僻無拘束好屋不住住破屋寥寥四壁蕩然空明月清風常自足其中棲泊知幾年頓空世慮忘生緣不撥萬象身獨露曲肱一枕恣高眠阿呵呵不弄乖生涯隨分絶安排豈是甘心受窮苦只圖賊不打貧家托鉢吟我有鉢盂一隻圓如日黑如漆塋然內外絶纖塵口大向天吞八極大庾嶺頭笑翻身七百黃梅徒費力德山親手托將來代代相傳到今日有時獨弄春風前萬象森羅俱失色有時𨁝跳兜率天驚倒當來老彌勒有時降卻老蒼龍總有神通逃不得有時滿給上方香積飯三萬二千龍象饑腹皆充塞管甚東山鐵酸餡子豈論楊岐金圈栗棘會須盡底盛將歸來一任衲僧橫吞豎喫直得天台五百一十六位聲聞僧從定起來合掌念個摩訶般若波羅蜜船居吟我泛扁舟活鱍鱍四海五湖閒快活一篙撐出愛河來笑看漚生與漚滅漚生全體現其中漚滅是形如電掣漚生漚滅本來空自是道人心路絶三界茫茫底用休塵勞迥脫何干涉利名畢竟是虛花白玉黃金眼中屑南北東西任去來春夏秋冬無異別任他寒任他熱道人自是心如鐵陋身篷底一天秋壞衲枕邊三尺雪黃蘆白鳥共忘機道人快活無可說碧潭深處放絲綸等閒一掣滄溟竭翻起銀濤似雪山極目江天無限闊這回不怕八風吹了然截斷輪回轍一聲欸乃歸去來空船滿載千江月月海歌長空萬里無雲翳蕩蕩碧天竟如洗萬象森羅影莫逃一色洞然無彼此昨夜金風輕漏泄浪花翻作千尋雪冰輪輾折珊瑚枝大海總是白銀闕海兮海兮何其清月兮月兮何其明海月交光兮照古今寥寥宇宙兮贏得其高名洞玄歌洞徹玄微歸至理剎剎塵塵無不是分明玄牝見端倪十二瓊樓眉睫裏蕩蕩乾坤闔還闢霜天青鳥無消息玉童倒跨天麒麟蹉腳踏折虛空脊窈兮冥兮精何精恍兮惚兮物何物廓開洞門三十六清虛一片凝寒碧真汞真鉛共一爐真液真精同一埒産出嬰兒奼女來緑鬢朱顏更殊絶三尺雲璈十二徽琅琅玉韻徹離微瞥然翻作無生曲白雪陽春和不齊我作洞玄歌寄與洞玄子記取洞玄時火龍動天地洞玄子知不知眼上何曾不帶眉碧玉壺中天地窄別有芥子藏須彌懶菴歌道者機關如木石此生不願循規則一物時中更不為世上萬緣俱泯息頽然兀坐茅堂中灰頭土面何形容百鳥銜花無覓處天神獻供徒西東擁帔看山兮簾不舒卷生苕撇地兮路任苔封一個蒲團閒靠壁從教兩耳吹松風頭陀歌藞苴頭陀能脫略胸次蕩然古標格恰似明珠走玉盤轉轆轆地無所著衲衣下事何足誇雲霞片片穿斷麻生苕不借春風力猶勝碓觜開天葩拄杖皴頭髮毿挲耳能著水眼能著沙終不拈長柄舀溪之杓換雪峰剃刀更不露傾湫倒嶽之機溼梁山袈裟笑俱胝受用天龍一指怪飲光微笑漏泄鷲嶺拈華一味落落魄魄䶥䶥齖齖自是風流出當家阿呵呵歸去來倒著一緉鐵鞋踏破千丈蒼苔東風西嶺謾徘徊萬山歌送榮維那之番易萬山道人蒙見過索我為作萬山歌太虛從來沒涯岸層峰疊嶂何其多眼力到處未極則秀色嵯峨鎖寒碧迢迢古澗來劫初源頭一派其中出青黃不改日月老屈指數到九千九百九十九朵之危峭別有一峰聳出縹渺煙雲間勢壓匡廬真絶倒道人從此而得名十分氣宇開懷抱鳥啼花笑自春風寥寥超出古皇道萬山萬山知不知見道忘山未是奇坐禪銘參禪的的非細事貴在當人發真志真志不發願不堅決定茫茫墮生死古德垂慈何太切教人參玄要直截話頭一則重千鈞盡力提持須猛烈進前退後知幾回恰似冰爐煉生鐵冰爐煉鐵真個難竭盡精神豈容歇驀然一拶火星飛面皮簉破通身熱鉗鎚妙密始見真手兮眼兮用處親就中煉出吹毛利干將莫邪爭比倫耿耿寒光耀空碧在在處處興家國外道天魔盡喪魄鐵額銅頭俱失色古今庫藏無爾珍天上人間何處覓殷勤為報參玄人趁此後生當努力桂菴歌颯颯西風動林麓炎歊散盡秋氣肅姮娥開卻蟾宮門當陽散出黃金粟漫空積地盈四簷靈葩不許群芳妍道人久住忘處所直疑此境是先天昔年山谷不知此卻恨晦堂無直指鼻端驀地來春風洞徹吾無隱乎爾子今桂菴兮為名索我再歌兮奚憑晝寂寂兮花鳥無聲夜寥寥兮月落空庭方竹杖歌靈苗異種天然別豈與凡竹同途轍內則虛圓外則方四棱凜凜凌霜雪炎歊拂散露清標歲寒歷盡全高節昔年為竿釣東海六鰲三山等閒掣今日以為拄杖子動轉施為活鱍鱍曉穿碧嶂雲夜鳴寒嶠月有時伴君行探深探淺何縱橫有時伴君住劃斷從前閒露布有時伴君坐孤根一任莓苔裹有時伴君臥冰床石枕成清墮或向高高山頂相扶進一步或向萬仞崖頭通個轉身路這竹杖絶比倫君子林中何處尋雖然自家屋裏人相忘無如汝無心送雲南妙書記道人雲南來訪我於雲間腳頭未跨門一鏃破三關吾家種草師子兒訴尾全奮金毛威機奪機也放兩拋三全賓全主境奪境也添多減少無缺無餘百城煙水都抹過信口橫吞鐵蒺藜參方須具參方眼莫道吾儂太擔板看取精金躍冶時普利人天有何限空處閒人歌為清禪人賦空處閒人間趣多索我空處閒人歌我儂亦在空閒處聽他塵世徒奔波信知空處閒人好空處從來少人到個中別是一乾坤六月冰霜寒悄悄空處空空空四壁空處長年自空寂閒人偏愛空處居動轉施為無朕跡個事明明觸處真雙忘人法始方親閒人原不異空處了知空處即閒人阿呵呵囉囉哩好把雲山舊衲衣拂乾滄溟直教徹底蓬塵飛黃花翠竹歌為空禪人賦重陽九月霜花濃芳英堆金東籬東靈根不假陽和力自是先天造化工四簷匝地清風起林薄有聲來不已枝枝宛若老龍鬚葉葉渾同蒼鳳尾虛心耐歲寒兮衆木森森豈能比滿屋生清香兮群葩簇簇難同委一地所生二俱美宇宙寥寥自終始黃花翠竹誰辨的灼然不許淵明識卻羡香巖老凍儂洞徹根源消一擊古也今也絶覆藏二三四七徒誇張真如般若只者是知音何必重商量十二時歌十二時幾人知眼上何曾不帶眉一口吹毛無背面寒光凜凜七星飛半夜子一忽覺來猶懶起湯婆子怒竹夫人一拳一腳打落地雞鳴丑錯認南辰為北斗採寶波斯去路長愁聞海底泥牛吼平旦寅耳不聾兮眼不昏金烏拍翅天大曉畫角一聲消夢魂日出卯目前總是長安道張三李四驀相逢一老元來一不老食時辰活計從頭又斬新平地波濤千萬丈從教淹殺弄潮人禺中巳成家須是敗家子寸絲不掛赤條條天地之間唯一己日南午香積鼕鼕打齊鼓大家飯飽肚膨脝坐看須彌盧作舞日昳未三尺竹篦無向背鞭起生蛇作活龍崢嶸頭角青雲外晡時申剎剎塵塵不用論阿修羅王鬥戰敗藕絲竅裏去藏身日入酉伸出一雙窮相手當陽把定鬼門關灼然不許行人走黃昏戌也無禪兮也無律萬派聲歸海上消大地漫漫黑如漆人定亥間卻從前舊兵鎧寥寥宇宙古風清皎皎寒蟾飛出海讚跋魚籃觀音籃裏錦鱗鮮且活遼天索價孰商量拖泥帶水歸來晚添得馬郎愁斷腸羅漢圖人間天上無心住多在山邊與水邊彈指一聲龍虎伏腳跟不費草鞋錢龐居士慕富卻忘貧苦日一時拋散了家私無端道個空諸有波及妻兒賣爪籬達磨祖師九年面壁接得神光一花五葉遍界流芳蘆葦悽悽暗度江咄天目山高峰和尚像生羈死關入易出難千古萬古西天目山禮高峰和尚塔狗舐熱油鐺一句集雲峰下四藤條拈來擲向乾坤外贏得稜層塔影高聖壽千嵒和尚這個老大阿師太煞為人儱侗手握黑漆竹篦打人不知輕重二十年前在錢塘江上發無明火燒卻慈雲嶺頭石佛兩道眉毛二十年後向伏龍峰頂涌智慧泉浸爛師子巖中幻翁半邊鼻孔個般粗慥得人憎大似白拈賊種師子寺常住請贊師真有口若啞有耳若聾佛法不會世法不通握條棒打雨敲風瞪雙目滯寂沉空且無巨靈手擘太華之峰豈布漫天網張蟭螟之蟲三十年枯坐船子釣灘之東如何起得西峰已墜之宗丹陽吉祥菴雪澗淨長老請贊面冷如霜口甜似蜜一味虛頭全無真實胸襟曠蕩兮千山堆裏橫條雪澗生涯拙鈍兮九曲河邊栽蓬栗棘指東話西拗曲作直丹陽郭外吉祥菴那裏著得這個賊福建振禪人請贊這個瞎漢不屬造作撞著冤家將錯就錯三十年吳淞江上撐無底船賣明月買清風二三載伏龍山頭坐曲彔床振金聲搖木鐸使盡福州人肚腸一任諸方貶剝慧藏沈氏請贊面皮凜冰霜佛祖也不識橫按黑竹篦虛空驚戰栗怪底臺山婆逢人道驀直未按指已前頓起膏肓疾縱使耆婆扁鵲那有這般奇特咄留與兒孫為法則慧本居士請贊從來個漢無思算一住茅菴三十年白日打眠空過了如何有口會談玄普首座請贊揮黑竹篦掃空觸背雖不露師子咬人之機要且不是韓盧逐塊敲出金剛腦後釘顯發普光明三昧煙簑擁膝坐漁磯等閒超出威音外明首座請贊誰向虛空添五彩分明覿面不相瞞蒲鞋踏破華亭月萬象森羅徹骨寒金山百戶張慧仁請贊妙在一機通身活路擒縱自由佛祖罔措吹毛影裏覺華開海上好山青朵朵百戶龔慧衡請贊手中三尺竹篦狀似吹毛利刃勦除邪見稠林蕩卻佛病祖病一片真風挽得回千古倒行摩竭令慧覺居士請贊滿月青山一溪流水不是桃源古今天地兀坐茅廬春晝長堂堂獨露自家底自家底緑樹重陰萬疊雲金香爐下鐵崑崙慧質居士請贊心不是佛智不是道白雲重重紅日杲杲揭開不二法門驚倒嵩山破灶一床獨坐淨名老咄慧銘居士請贊竹篦黑漆漆眼睛明歷歷敲碎太虛空出金剛骨咄抹過二三并四七慧山居士請贊者個老漢著甚來由藞藞苴苴豈識宗猷少年騎竹馬恣意逞風流當場衝破龍蛇陳縱橫自任樂悠悠長大牧水牯耕遍劫初疇疊疊高低風景好笑看黃雲萬頃秋拈得龍峰飼貓器無端放在松溪頭止有一條龜毛線釣盡江波卒未休姑蘇兜率園比丘明聞閲長洲縣佛弟子王鳴鸞陳兀瑞范以明捐資刻唯菴禪師語第三卷吳門九章朱袞對稿金陵潘耕書自聞道人蔣成榮刊崇禎二年己巳歲佛成道日姑蘇兜率園識松隱唯菴然和尚語録後序唯菴和尚語録蓋直指單提一心上乘之法超出古人蹊徑驚其若銀河瀉天莫知其極真所謂能繼千巖之緒而大其家世者也何其偉哉覽是編者又豈無如古塔主之讀雲門語而契其機者乎時洪武四年春三月南屏住山懷渭撰
